<section class="modules" id="modules" aria-labelledby="modules-title">

  <header class="section-header">

    <span class="section-tag">
      {{ 'MODULES.TAG' | translate }}
    </span>

    <div class="cos-pricing-badge">

      <app-icon
        name="check-square"
        color="#FFFFFF"
        size="md"
        strokeWidth="semibold">
      </app-icon>

      <span>
        {{ 'MODULES.BADGE' | translate }}
      </span>

    </div>

    <h2 id="modules-title" class="section-title">
      {{ 'MODULES.TITLE' | translate }}
    </h2>

    <p class="section-subtitle">
      {{ 'MODULES.SUBTITLE' | translate }}
    </p>

  </header>


  <div class="carousel-wrapper">

    <div
      class="carousel-container"
      (mouseenter)="pauseAutoSlide()"
      (mouseleave)="resumeAutoSlide()"
    >

      <div class="modules-carousel">

        <article
          class="module-slide"
          *ngFor="let module of modules; let i = index; trackBy: trackByIndex"
          [class.active]="i === currentIndex"
        >

          <div class="module-content">

            <div class="module-info">

              <div class="module-badge">

                <span class="module-number">
                  {{ module.number }}
                </span>

                <span class="module-category">
                  {{ module.category | translate }}
                </span>

              </div>

              <h3 class="module-title">
                {{ module.title | translate }}
              </h3>

              <p class="module-description">
                {{ module.description | translate }}
              </p>

              <ul class="module-features">

                <li *ngFor="let feature of module.features">

                  <svg viewBox="0 0 24 24">
                    <path
                      d="M20 6L9 17L4 12"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>

                  <span [innerHTML]="feature | translate"></span>

                </li>

              </ul>

            </div>


            <div class="module-image-wrapper">

              <div class="image-frame">

                <img
                  *ngIf="module.image"
                  [src]="module.image"
                  [alt]="module.title | translate"
                  loading="lazy"
                  decoding="async"
                  width="600"
                  height="600"
                />

                <div class="image-glow"></div>

              </div>

            </div>

          </div>

        </article>

      </div>


      <button
        class="carousel-btn prev"
        (click)="move(-1)"
          (mouseenter)="hoverPrev = true"
  (mouseleave)="hoverPrev = false"
        aria-label="Previous slide"
      >
        <app-icon
            name="chevron-left"
            [color]="hoverPrev ? '#FFFFFF' : '#000000'"
            size="2xl"
            strokeWidth="semibold">
          </app-icon>
      </button>


      <button
        class="carousel-btn next"
        (click)="move(1)"
          (mouseenter)="hoverNext = true"
  (mouseleave)="hoverNext = false"
        aria-label="Next slide"
      >
          <app-icon
            name="chevron-right"
            [color]="hoverNext ? '#FFFFFF' : '#000000'"
            size="2xl"
            strokeWidth="semibold">
          </app-icon>
      </button>

    </div>


    <div class="carousel-dots">

      <button
        class="dot"
        *ngFor="let m of modules; let i = index"
        [class.active]="i === currentIndex"
        (click)="goTo(i)"
        [attr.aria-label]="'Go to module ' + (i + 1)"
        [attr.aria-current]="i === currentIndex ? 'true' : null"
      ></button>

    </div>

  </div>

</section>
