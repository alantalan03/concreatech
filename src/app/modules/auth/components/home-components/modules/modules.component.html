<section class="modules" id="modules">

  <header class="section-header">

    <span class="section-tag">
      {{ 'MODULES.TAG' | translate }}
    </span>
    <br>

    <div class="cos-pricing-badge">

      <app-icon name="check-square" color="#FFFFFF" size="md" strokeWidth="semibold">
      </app-icon>

      <span>
        {{ 'MODULES.BADGE' | translate }}
      </span>

    </div>

    <h2 class="section-title">
      {{ 'MODULES.TITLE' | translate }}
    </h2>

    <p class="section-subtitle">
      {{ 'MODULES.SUBTITLE' | translate }}
    </p>

  </header>


  <div class="carousel-wrapper">

    <div class="carousel-container">

      <div class="modules-carousel">

        <article
          class="module-slide"
          *ngFor="let module of modules; let i = index; trackBy: trackByIndex"
          [class.active]="i === currentIndex"
        >

          <div class="module-content">

            <div class="module-info">

              <div class="module-badge">

                <span class="module-number">
                  {{ module.number }}
                </span>

                <span class="module-category">
                  {{ module.category | translate }}
                </span>

              </div>


              <h3 class="module-title">
                {{ module.title | translate }}
              </h3>


              <p class="module-description">
                {{ module.description | translate }}
              </p>


              <ul class="module-features">

                <li *ngFor="let feature of module.features">

                  <svg viewBox="0 0 24 24">
                    <path
                      d="M20 6L9 17L4 12"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>

                  <span>
                    {{ feature | translate }}
                  </span>

                </li>

              </ul>

            </div>


            <div class="module-image-wrapper">

              <div class="image-frame">

                <img
                  *ngIf="module.image"
                  [src]="module.image"
                  [alt]="module.title | translate"
                  loading="lazy"
                />

                <div class="image-glow"></div>

              </div>

            </div>

          </div>

        </article>

      </div>


      <button
        class="carousel-btn prev"
        (click)="move(-1)"
        aria-label="Previous slide"
      >
        <svg viewBox="0 0 24 24">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>


      <button
        class="carousel-btn next"
        (click)="move(1)"
        aria-label="Next slide"
      >
        <svg viewBox="0 0 24 24">
          <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>

    </div>


    <div class="carousel-dots">

      <button
        class="dot"
        *ngFor="let m of modules; let i = index"
        [class.active]="i === currentIndex"
        (click)="goTo(i)"
      ></button>

    </div>

  </div>

</section>
