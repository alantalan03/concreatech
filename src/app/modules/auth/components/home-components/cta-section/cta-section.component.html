<section class="cta-section" id="contacto">

  <div class="cta-content">

    <h2 class="cta-title">
      {{ 'CTA.TITLE' | translate }}
    </h2>

    <p class="cta-description">
      <span [innerHTML]="'CTA.DESCRIPTION' | translate"></span>
    </p>

    <div class="cta-buttons">

      <a
        href="https://calendly.com/concreatech-mx/30min"
        target="_blank"
        rel="noopener noreferrer"
        class="btn-primary"
      >
        {{ 'CTA.BUTTON_DEMO' | translate }}
      </a>

      <a
        href="https://calendly.com/concreatech-mx/30min"
        target="_blank"
        rel="noopener"
        class="btn-secondary calendly-btn"
      >

        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M16 2V6M8 2V6M3 10H21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"/>
        </svg>

        {{ 'CTA.BUTTON_MEETING' | translate }}

      </a>

    </div>

  </div>

</section>
