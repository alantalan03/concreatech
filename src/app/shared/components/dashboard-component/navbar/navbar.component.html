<nav class="navbar" [class.scrolled]="isScrolled">

  <div class="nav-container">

    <div class="logo" (click)="scrollTo('inicio')">
      <img
        src="assets/logos/logotipo.png"
        class="logo-image"
        alt="Logo ConcreaTech"
      />
    </div>

    <ul class="nav-links desktop-only">

      <li
        *ngFor="let item of navItems"
        [class.active]="activeSection === item.id"
        (click)="scrollTo(item.id)"
      >
        {{ item.label | translate }}
      </li>

    </ul>

    <div class="nav-actions">

      <a
        href="https://cos.concreatech.com.mx/login"
        class="login-button desktop-only"
      >
        {{ 'NAV.LOGIN' | translate }}
      </a>

      <a
        href="https://calendly.com/concreatech-mx/30min"
        target="_blank"
        class="cta-button desktop-only"
      >
        {{ 'NAV.DEMO' | translate }}
      </a>

      <app-language-selector class="desktop-only"></app-language-selector>

      <div
        class="menu-toggle mobile-only"
        [class.open]="menuOpen"
        (click)="toggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

  </div>

</nav>


<div
  class="mobile-overlay"
  [class.open]="menuOpen"
  (click)="closeMenu()"
></div>


<div
  class="mobile-menu"
  [class.open]="menuOpen"
>

  <div class="mobile-header">

    <img
      src="assets/logos/logotipo.png"
      class="mobile-logo"
      alt="ConcreaTech"
    />

    <button
      class="mobile-close"
      (click)="closeMenu()"
      aria-label="Close menu"
    >
      ✕
    </button>

  </div>


  <nav class="mobile-links">

    <a
      *ngFor="let item of navItems"
      (click)="scrollTo(item.id)"
      [class.active]="activeSection === item.id"
    >
      {{ item.label | translate }}
    </a>

  </nav>


  <div class="mobile-actions">

    <a
      href="https://cos.concreatech.com.mx/login"
      class="mobile-login"
    >
      {{ 'NAV.LOGIN' | translate }}
    </a>

    <a
      href="https://calendly.com/concreatech-mx/30min"
      target="_blank"
      class="mobile-cta"
    >
      {{ 'NAV.DEMO' | translate }}
    </a>

  </div>


  <div class="mobile-divider"></div>


  <div class="mobile-lang">

    <button (click)="changeLang('es')">
      🇲🇽 Español
    </button>

    <button (click)="changeLang('en')">
      🇺🇸 English
    </button>

    <button (click)="changeLang('pt')">
      🇧🇷 Português
    </button>

  </div>

</div>
